<!doctype html>
<html lang="zh"><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI禅院草名录快速检索 v0.1</title>
<style>body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;padding:16px;max-width:1100px;margin:auto} input{width:100%;padding:10px;font-size:16px} table{width:100%;border-collapse:collapse;margin-top:12px} th,td{border:1px solid #ddd;padding:8px;font-size:14px} th{background:#f5f5f5;text-align:left} .muted{color:#666;font-size:12px}</style>
<h2>AI禅院草名录快速检索 <span class="muted">v0.1（仅AI名/网址/中文禅院草名）</span></h2>
<input id="q" placeholder="输入 AI名 / 中文草名 / 网址 关键词，例如：携程、旅舟草、ctrip" />
<div class="muted" id="meta"></div>
<table><thead><tr><th>AI名称</th><th>中文禅院草名</th><th>网址</th></tr></thead><tbody id="tb"></tbody></table>
<script>
let data=[];
function esc(s){return (s||'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function render(list){const tb=document.getElementById('tb'); tb.innerHTML=list.map(x=>`<tr><td>${esc(x.ai_name)}</td><td>${esc(x.grass_name_zh)}</td><td>${x.url?`<a href="${esc(x.url)}" target="_blank">${esc(x.url)}</a>`:''}</td></tr>`).join(''); document.getElementById('meta').textContent=`共 ${data.length} 条，当前命中 ${list.length} 条`;}
function run(){const q=document.getElementById('q').value.trim().toLowerCase(); if(!q){render(data);return;} const list=data.filter(x=>[x.ai_name,x.grass_name_zh,x.url].join(' ').toLowerCase().includes(q)); render(list);}
fetch('./registry_quick_index_v0.1.json').then(r=>r.json()).then(j=>{data=j; render(data);});
document.getElementById('q').addEventListener('input',run);
</script></html>
