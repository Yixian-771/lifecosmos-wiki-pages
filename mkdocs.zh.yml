site_name: 生命禅院百科馆
site_url: "http://wiki.lifecosmos.org/zh/"
docs_dir: zh
site_dir: site/zh
use_directory_urls: true

theme:
  name: material
  language: zh
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight

markdown_extensions:
  - toc:
      permalink: true
  - tables
  - admonition
  - pymdownx.superfences
  - pymdownx.details

plugins:
  - search:
      lang: zh

nav:
  - 首页: index.md
  - 无极: wuji/index.md
  - 太极: taiji/index.md
  - 宇宙起源: universe-origin/index.md
  - 生命起源: life-origin/index.md
  - 三十六维空间: thirty-six-dimensional-space/index.md
  - 仙岛群岛洲: celestial-islands-continent/index.md
